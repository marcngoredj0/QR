<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Sample Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  background: #f5f6fa;
}

h2, h3 {
  text-align: center;
  margin-bottom: 10px;
}

#reader {
  width: 100%;
  max-width: 400px;
  margin: auto;
}

#formSection {
  display: none;
}

table {
  width: 100%;
  max-width: 500px;
  margin: 10px auto;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th {
  background: #0078d4;
  color: white;
}

th, td {
  padding: 12px;
  text-align: left;
  font-size: 16px;
}

tr:nth-child(even) {
  background: #f2f2f2;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 18px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

/* Big mobile button */
button {
  width: 90%;
  max-width: 400px;
  padding: 15px;
  font-size: 18px;
  margin: 20px auto;
  display: block;
  background: #28a745;
  color: white;
  border: none;
  border-radius: 10px;
}

button:active {
  background: #218838;
}
</style>

</head>

<body>

<h2>Scan Sample QR Code</h2>

<div id="reader"></div>

<div id="formSection">
  <h3>Enter Sample Weights</h3>

  <table>
    <thead>
      <tr>
        <th>Sample ID</th>
        <th>Weight</th>
      </tr>
    </thead>
    <tbody id="sampleTable"></tbody>
  </table>

  <button onclick="generateCSV()">Submit & Download CSV</button>
</div>

<script>

let scannedSamples = [];
let html5QrCode = new Html5Qrcode("reader");

function onScanSuccess(decodedText) {
  console.log("QR Result:", decodedText);

  html5QrCode.stop();

  scannedSamples = decodedText.split(",").map(s => s.trim());

  document.getElementById("reader").style.display = "none";
  document.getElementById("formSection").style.display = "block";

  const table = document.getElementById("sampleTable");
  table.innerHTML = "";

  scannedSamples.forEach((sample, index) => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${sample}</td>
      <td>
        <input 
          type="number"
          inputmode="decimal"
          step="any"
          id="weight-${index}"
          placeholder="0.00">
      </td>
    `;

    table.appendChild(row);
  });

  // Auto move to next input on Enter
  setTimeout(() => {
    const inputs = document.querySelectorAll("input");

    inputs.forEach((input, i) => {
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          if (inputs[i + 1]) {
            inputs[i + 1].focus();
          }
        }
      });
    });

    // Focus first input
    if (inputs.length > 0) inputs[0].focus();
  }, 100);
}

function onScanError(err) {
  // ignore scan errors
}

function generateCSV() {
  let csv = "SampleID,Weight\n";

  for (let i = 0; i < scannedSamples.length; i++) {
    const weight = document.getElementById(`weight-${i}`).value;

    if (!weight) {
      alert("Please fill all weights before submitting");
      return;
    }

    csv += `${scannedSamples[i]},${weight}\n`;
  }

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "sample_weights.csv";
  a.click();

  URL.revokeObjectURL(url);
}

// Start scanner
html5QrCode.start(
  { facingMode: "environment" },
  {
    fps: 10,
    qrbox: { width: 250, height: 250 }
  },
  onScanSuccess,
  onScanError
).catch(err => {
  alert("Camera error: " + err);
});

</script>

</body>
</html>
