<!DOCTYPE html>
<html>
<head>
  <title>EtherCalc Sample Weights</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    select, input, button { margin: 5px 0; padding: 5px; }
    .row { margin-bottom: 8px; }
    .container { margin-top: 20px; }
  </style>
</head>
<body>

<h2>Sample Weight Entry</h2>

<label>Select Hole ID:</label><br>
<select id="holeSelect">
  <option value="">-- Select Hole --</option>
</select>

<div id="formContainer" class="container"></div>

<button id="submitBtn" style="display:none;">Submit Weights</button>

<script>
const sheetURL = "https://ethercalc.net/29dc84f33e2a";
let data = [];
let filteredRows = [];


function colLetter(n){
  let s = "";
  while(n > 0){
    let m = (n - 1) % 26;
    s = String.fromCharCode(65 + m) + s;
    n = Math.floor((n - m) / 26);
  }
  return s;
}


fetch(sheetURL + ".csv")
  .then(res => res.text())
  .then(csv => {
    let rows = csv.split("\n").map(r => r.split(","));
    

    data = rows.slice(1).map((row, i) => ({
      rowIndex: i + 2,   // row number in EtherCalc
      hole: row[0],
      sample: row[1]
    }));

    initDropdown();
  });

function initDropdown(){
  let select = document.getElementById("holeSelect");

  let uniqueHoles = [...new Set(data.map(d => d.hole))];

  uniqueHoles.forEach(h => {
    let opt = document.createElement("option");
    opt.value = h;
    opt.textContent = h;
    select.appendChild(opt);
  });

  select.addEventListener("change", buildForm);
}

function buildForm(){
  let hole = document.getElementById("holeSelect").value;
  let container = document.getElementById("formContainer");
  let btn = document.getElementById("submitBtn");

  container.innerHTML = "";
  if (!hole) {
    btn.style.display = "none";
    return;
  }

  filteredRows = data.filter(d => d.hole === hole);

  filteredRows.forEach((row, i) => {
    let div = document.createElement("div");
    div.className = "row";

    div.innerHTML = `
      <label>${row.sample}</label>
      <input type="number" step="any" id="w_${i}" placeholder="Weight">
    `;

    container.appendChild(div);
  });

  btn.style.display = "inline-block";
}

document.getElementById("submitBtn").addEventListener("click", () => {

  let updates = [];

  filteredRows.forEach((row, i) => {
    let val = document.getElementById(`w_${i}`).value;
    if (val !== "") {
      // Column C = weights
      let cell = "C" + row.rowIndex;
      updates.push({cell, value: val});
    }
  });

  if (updates.length === 0) {
    alert("No values entered");
    return;
  }


  let body = updates.map(u => {
    return `set ${u.cell} value n ${u.value}`;
  }).join("\n");

  fetch(sheetURL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: body
  })
  .then(() => {
    alert("Weights submitted successfully!");
  })
  .catch(err => {
    alert("Error updating sheet");
    console.error(err);
  });

});
</script>

</body>
</html>
